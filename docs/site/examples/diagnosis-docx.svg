<text x="46.0" y="57.0" font-size="11" fill="#222">原材料価格が世界的に高騰した。</text>
<rect x="40.0" y="122.0" width="190.0" height="46.0" rx="4" fill="#e8f0ff" stroke="#3a6" stroke-width="1"/>
<text x="46.0" y="149.0" font-size="11" fill="#222">自社の製造コストが大幅に上昇した…</text>
<rect x="148.0" y="214.0" width="190.0" height="46.0" rx="4" fill="#e8f0ff" stroke="#3a6" stroke-width="1"/>
<text x="154.0" y="241.0" font-size="11" fill="#222">採算確保のため販売価格を引き上げ…</text>
<rect x="148.0" y="306.0" width="190.0" height="46.0" rx="4" fill="#e8f0ff" stroke="#3a6" stroke-width="1"/>
<text x="154.0" y="333.0" font-size="11" fill="#222">値上げの影響で販売数量が落ち込ん…</text>
<rect x="148.0" y="398.0" width="190.0" height="46.0" rx="4" fill="#e8f0ff" stroke="#3a6" stroke-width="1"/>
<text x="154.0" y="425.0" font-size="11" fill="#222">売上高は前年同期を下回った。</text>
<rect x="256.0" y="30.0" width="190.0" height="46.0" rx="4" fill="#e8f0ff" stroke="#3a6" stroke-width="1"/>
<text x="262.0" y="57.0" font-size="11" fill="#222">競合が大規模な値下げを実施した。</text>
<rect x="256.0" y="122.0" width="190.0" height="46.0" rx="4" fill="#e8f0ff" stroke="#3a6" stroke-width="1"/>
<text x="262.0" y="149.0" font-size="11" fill="#222">当社の市場シェアが低下した。</text>
<rect x="148.0" y="490.0" width="190.0" height="46.0" rx="4" fill="#e8f0ff" stroke="#3a6" stroke-width="1"/>
<text x="154.0" y="517.0" font-size="11" fill="#222">四半期の営業利益は前年から悪化し…</text>
<rect x="148.0" y="582.0" width="190.0" height="46.0" rx="4" fill="#eee" stroke="#999" stroke-width="1"/>
<text x="154.0" y="609.0" font-size="11" fill="#222">今期は新オフィスに移転した。</text>
