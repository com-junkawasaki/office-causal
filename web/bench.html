<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>office-casual — E2B vs E4B 実機ベンチ (WebGPU)</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 820px; margin: 1.5rem auto; padding: 0 1rem; }
      button { padding: 0.5rem 1.1rem; font-size: 15px; cursor: pointer; }
      pre { background: #111; color: #b9f; padding: 0.7rem; border-radius: 6px; overflow: auto; max-height: 16rem; font-size: 12px; }
      table { margin: 1rem 0; font-size: 14px; }
      th { background: #eef; }
      .note { color: #666; font-size: 13px; }
      label { margin-right: 1rem; }
      .banner { background: #fff3cd; border: 1px solid #ffe08a; color: #6a5200; border-radius: 6px; padding: 0.7rem 0.9rem; margin: 0.6rem 0; font-size: 13px; }
      .banner.ok { background: #e7f7ec; border-color: #b6e3c4; color: #1b5e34; }
    </style>
    <script type="importmap">
      { "imports": { "@huggingface/transformers": "https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.2.0" } }
    </script>
  </head>
  <body>
    <h1>E2B vs E4B 実機ベンチ (WebGPU)</h1>
    <p class="note">
      Gemma 4 を <b>transformers.js v4 + WebGPU</b> でブラウザ実行し、因果裁定タスク（8因果+3非因果）で
      loadMs / ms・件 / tokens・秒 / 向き精度 / 極性精度 / JSON率 を計測。値は端末・ブラウザ依存。
      初回は各モデル（数百MB〜）を DL します。 <a href="./index.html">← 因果グラフ デモへ</a>
    </p>
    <div id="banner" class="banner" hidden></div>
    <p>
      <label><input type="checkbox" name="m" value="onnx-community/gemma-4-E2B-it-ONNX" checked /> Gemma 4 E2B</label>
      <label><input type="checkbox" name="m" value="onnx-community/gemma-4-E4B-it-ONNX" /> Gemma 4 E4B</label>
    </p>
    <p><button id="runBtn">Run ベンチ</button></p>
    <div id="table"></div>
    <h3>ログ</h3>
    <pre id="log"></pre>
    <script type="module" src="./bench.js"></script>
  </body>
</html>
